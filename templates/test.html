<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Iris Classifier</title>
</head>
<body>
    <h1>Iris Classifier</h1>
    <form id="irisForm">
        <label>Sepal Length: <input type="number" step="0.1" name="SepalLengthCm" required></label><br>
        <label>Sepal Width: <input type="number" step="0.1" name="SepalWidthCm" required></label><br>
        <label>Petal Length: <input type="number" step="0.1" name="PetalLengthCm" required></label><br>
        <label>Petal Width: <input type="number" step="0.1" name="PetalWidthCm" required></label><br>
        <button type="submit">Prédire</button>
    </form>

    <h2 id="result"></h2>

    <script>
        document.getElementById("irisForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            for (let key in data) {
                data[key] = parseFloat(data[key]);
            }

            const response = await fetch("/predict", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            });

            const result = await response.json();
            document.getElementById("result").innerText = 
                "Prédiction: " + (result.prediction || result.error) +
                (result.confidence ? " (confiance: " + result.confidence + ")" : "");
        });
    </script>
</body>
</html>
